<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Animation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        .dashboard-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            /* Mocking the dashboard background */
            background-image: linear-gradient(to right, #f8f9fa 200px, transparent 200px), 
                              radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px;
            background-position: 0 0, 200px 0;
            transform: rotateX(5deg) rotateY(-5deg);
            transform-style: preserve-3d;
            animation: float-dash 6s ease-in-out infinite;
        }

        .sidebar {
            position: absolute;
            left: 20px;
            top: 20px;
            width: 160px;
            height: 560px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar .btn {
            background: #0052ff;
            height: 40px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .sidebar .item {
            height: 20px;
            background: #f1f5f9;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        /* Floating Cards */
        .card {
            position: absolute;
            background: white;
            border-radius: 16px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transform: translateZ(50px);
            opacity: 0;
        }

        /* Top Right Card */
        .card-top {
            top: 40px;
            right: -40px;
            animation: slide-in-right 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards,
                       float-card-1 4s ease-in-out infinite 1.5s;
        }

        .icon-green {
            width: 48px;
            height: 48px;
            background: #e6f7ec;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #10b981;
            font-size: 24px;
        }

        .icon-green svg {
            width: 24px; height: 24px; fill: currentColor;
        }

        /* Bottom Left Card */
        .card-bottom {
            bottom: 40px;
            left: -40px;
            animation: slide-in-left 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards,
                       float-card-2 5s ease-in-out infinite 1.8s;
        }

        .icon-blue {
            width: 48px;
            height: 48px;
            background: #e0e7ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4f46e5;
        }

        .icon-blue svg {
            width: 24px; height: 24px; fill: currentColor;
        }

        .text-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .value {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
        }

        /* Keyframes */
        @keyframes slide-in-right {
            from { transform: translateZ(50px) translateX(50px); opacity: 0; }
            to { transform: translateZ(50px) translateX(0); opacity: 1; }
        }

        @keyframes slide-in-left {
            from { transform: translateZ(50px) translateX(-50px); opacity: 0; }
            to { transform: translateZ(50px) translateX(0); opacity: 1; }
        }

        @keyframes float-dash {
            0%, 100% { transform: rotateX(5deg) rotateY(-5deg) translateY(0); }
            50% { transform: rotateX(5deg) rotateY(-5deg) translateY(-10px); }
        }

        @keyframes float-card-1 {
            0%, 100% { transform: translateZ(50px) translateY(0); }
            50% { transform: translateZ(50px) translateY(-8px); }
        }

        @keyframes float-card-2 {
            0%, 100% { transform: translateZ(50px) translateY(0); }
            50% { transform: translateZ(50px) translateY(8px); }
        }

        /* Connecting lines animation effect */
        .ping {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: inherit;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes ping {
            75%, 100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="sidebar">
            <div class="btn"></div>
            <div class="item" style="width: 80%"></div>
            <div class="item" style="width: 60%"></div>
            <div class="item" style="width: 70%"></div>
            <div class="item" style="width: 50%"></div>
        </div>

        <!-- Top Right Card -->
        <div class="card card-top">
            <div class="icon-green">
                <div class="ping"></div>
                <svg viewBox="0 0 24 24"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM20 16H5.17L4 17.17V4H20V16Z"/></svg>
            </div>
            <div class="text-group">
                <div class="label">Novo Lead WhatsApp</div>
                <div class="value">+ R$ 450,20 sugeridos</div>
            </div>
        </div>

        <!-- Bottom Left Card -->
        <div class="card card-bottom">
            <div class="icon-blue">
                <div class="ping" style="animation-delay: 1s"></div>
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20ZM11 7H13V13H11V7ZM11 15H13V17H11V15Z"/></svg>
            </div>
            <div class="text-group">
                <div class="label">Status Alba IA</div>
                <div class="value">Analisando Receita...</div>
            </div>
        </div>
    </div>

</body>
</html>
